name: LStore Deploy

on:
  push:
    branches:
      - master  # دیپلوی روی تغییرات در برنچ مستر

jobs:
  deploy:
    runs-on: self-hosted  # Self-hosted Runner

    steps:
      - name: Checkout code
        uses: actions/checkout@v2  # دریافت کد پروژه

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Deploy to local server
        run: |
          cp -R . /var/www/store/public_html
          chmod -R 775 /var/www/store/public_html/storage /var/www/store/public_html/bootstrap/cache

      - name: Run migrations
        run: |
          #cd /var/www/store/public_html
          #php artisan migrate --force
          #php artisan db:seed --force

      - name: Cache configuration
        run: |
          cd /var/www/store/public_html/lstore
          php artisan config:cache
          php artisan route:cache
          php artisan view:cache

