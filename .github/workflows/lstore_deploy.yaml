name: LStore Deploy

on:
  push:
    branches:
      - master  # دیپلوی روی تغییرات در برنچ مستر

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v2  # دریافت کد پروژه

      - name: Check if SSH_PRIVATE_KEY is set
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          if [ -z "$SSH_PRIVATE_KEY" ]; then
            echo "SSH_PRIVATE_KEY is not set"
          else
            echo "SSH_PRIVATE_KEY is set"
          fi




      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Deploy to server
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          if [ -f ~/.ssh/id_rsa ]; then
            echo "id_rsa file created successfully."
          else
            echo "Failed to create id_rsa file."
            exit 1
          fi
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "192.168.1.105" >> ~/.ssh/known_hosts
          # اضافه کردن -v برای نمایش خروجی بیشتر
          ssh -vvv -i ~/.ssh/id_rsa matin@192.168.1.105 "echo 'SSH connection successful'"

